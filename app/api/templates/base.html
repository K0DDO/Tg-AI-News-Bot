<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}TG News Admin{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #3d9cf0;
      --danger: #e85d5d;
      --ok: #3ecf8e;
      --border: #2a3548;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1b2a40, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }
    main { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    h1 { font-size: 1.6rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); margin-bottom: 1.5rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }
    .stat strong { display: block; font-size: 1.5rem; }
    .stat span { color: var(--muted); font-size: 0.85rem; }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    h2 { margin: 0 0 1rem; font-size: 1.1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.55rem 0.4rem; border-bottom: 1px solid var(--border); font-size: 0.92rem; }
    th { color: var(--muted); font-weight: 600; }
    form.inline { display: inline; }
    input, button {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 0.45rem 0.65rem;
      background: #121a26;
      color: var(--text);
    }
    button {
      cursor: pointer;
      background: var(--accent);
      border-color: transparent;
      color: #041018;
      font-weight: 600;
    }
    button.danger { background: var(--danger); color: #fff; }
    button.ghost { background: transparent; color: var(--text); border-color: var(--border); }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .badge { font-size: 0.75rem; padding: 0.15rem 0.45rem; border-radius: 999px; }
    .badge.on { background: rgba(62,207,142,0.15); color: var(--ok); }
    .badge.off { background: rgba(232,93,93,0.15); color: var(--danger); }
  </style>
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
