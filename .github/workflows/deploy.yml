# Deploy Briefly — только /opt/briefly на общем VPS
#
# Secrets (GitHub → Settings → Secrets → Actions):
#   VPS_HOST     — IP или hostname VPS
#   VPS_USER     — deploy
#   VPS_SSH_KEY  — приватный SSH-ключ (никогда не логировать / не коммитить)
#
# Этот workflow НЕ трогает Amnezia VPN, /opt/moex-bot, другие контейнеры,
# iptables, firewall, docker system prune, volumes чужих проектов.

name: Deploy Briefly

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-briefly-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS (/opt/briefly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SSH deploy (Briefly only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 25m
          # Do not pass env secrets into remote shell that could be echoed
          script: |
            set -euxo pipefail

            echo "=== TEST START ==="

            echo "WHOAMI:"
            whoami

            echo "ID:"
            id

            echo "GROUPS:"
            groups

            echo "PWD:"
            pwd

            echo "HOME:"
            echo "$HOME"

            echo "=== TEST END ==="
