services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsbot}
      POSTGRES_DB: ${POSTGRES_DB:-newsbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsbot} -d ${POSTGRES_DB:-newsbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsbot}:${POSTGRES_PASSWORD:-newsbot}@postgres:5432/${POSTGRES_DB:-newsbot}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsbot}:${POSTGRES_PASSWORD:-newsbot}@postgres:5432/${POSTGRES_DB:-newsbot}
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsbot}:${POSTGRES_PASSWORD:-newsbot}@postgres:5432/${POSTGRES_DB:-newsbot}
      POSTGRES_HOST: postgres
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.bot.main"]
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsbot}:${POSTGRES_PASSWORD:-newsbot}@postgres:5432/${POSTGRES_DB:-newsbot}
      POSTGRES_HOST: postgres
      TELEGRAM_SESSION_DIR: /app/data/sessions
    volumes:
      - telethon_sessions:/app/data/sessions
      - hf_cache:/app/data/hf_cache
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "app.tasks.worker"]
    restart: unless-stopped

volumes:
  pgdata:
  telethon_sessions:
  hf_cache:
